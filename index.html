  .empty{padding:20px;text-align:center;font-size:13px;color:#888}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0F6E56;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:1000;display:none}

// ── LOGIN ──
window.doLogin = async function() {
  const cedula = document.getElementById('loginCedula').value.trim();
  const nombre = document.getElementById('loginNombre').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!cedula || cedula.length < 5) { errEl.textContent = 'Ingresa un número de cédula válido.'; errEl.style.display = 'block'; return; }
  if (!nombre || nombre.length < 3) { errEl.textContent = 'Ingresa tu nombre completo.'; errEl.style.display = 'block'; return; }
  // Guardar o actualizar usuario en Firebase
  await setDoc(doc(db, 'usuarios', cedula), { cedula, nombre, ultimoAcceso: new Date().toISOString() }, { merge: true });
  currentUser = { cedula, nombre };
  // Guardar en sessionStorage para no pedir en cada recarga
  sessionStorage.setItem('ravelUser', JSON.stringify(currentUser));
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  // Mostrar chip usuario
  const initials = nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userNombreChip').textContent = nombre.split(' ')[0];
  await initData();
}

window.cerrarSesion = function() {
  sessionStorage.removeItem('ravelUser');

  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginCedula').value = '';
  document.getElementById('loginNombre').value = '';
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getProximo(v, k) {
  const base = kmBase[v.placa]?.[k];
  if (base !== undefined && base !== '') return parseInt(base) + v.int[k];
  if (!v.km || !v.int[k]) return null;
  return Math.floor(v.km / v.int[k]) * v.int[k] + v.int[k];
}

function getFaltante(v, k) {
  if (!v.km || !v.int[k]) return null;
  const p = getProximo(v, k);
  return p ? p - v.km : null;
}

function estadoBadge(f) {
  if (f === null) return 'gris';
  if (f <= 0) return 'rojo';
  if (f <= 1500) return 'amarillo';
  return 'verde';
}

function dotColor(est) {
  return {rojo:'#A32D2D',amarillo:'#BA7517',verde:'#3B6D11',gris:'#999'}[est] || '#999';
}

async function initData() {
  const vSnap = await getDocs(collection(db, 'vehiculos'));
  if (vSnap.empty) {
    for (const v of VEHICULOS_SEED) {
      await setDoc(doc(db, 'vehiculos', v.placa), v);
    }
    vehiculos = VEHICULOS_SEED.map(v => ({...v}));
  } else {
    vehiculos = vSnap.docs.map(d => {
      const data = d.data();
      const seed = VEHICULOS_SEED.find(v => v.placa === d.id);
      return { ...seed, ...data, int: seed?.int || data.int };
    });
  }

  const kSnap = await getDocs(collection(db, 'kmBase'));
  kSnap.forEach(d => { kmBase[d.id] = d.data(); });

  const rSnap = await getDocs(query(collection(db, 'registros'), orderBy('fecha', 'desc')));
  registros = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  const tSnap = await getDoc(doc(db, 'config', 'talleres'));
  if (tSnap.exists()) talleres = tSnap.data().lista;

  histPlaca = vehiculos[0]?.placa || '';
  document.getElementById('subtitulo').textContent = `${vehiculos.length} vehículos · ${currentUser ? currentUser.nombre : ''} · 2026`;
  renderNav();
  renderView();
}

async function saveVehiculo(placa, data) {
  const idx = vehiculos.findIndex(v => v.placa === placa);
  if (idx >= 0) { vehiculos[idx] = { ...vehiculos[idx], ...data }; }
  const { int, ...rest } = vehiculos[idx];
  await setDoc(doc(db, 'vehiculos', placa), { ...rest }, { merge: true });
}

async function saveKmBase(placa, data) {
  if (!kmBase[placa]) kmBase[placa] = {};
  kmBase[placa] = { ...kmBase[placa], ...data };
  await setDoc(doc(db, 'kmBase', placa), kmBase[placa]);
}

async function addRegistro(reg) {
  const ref = await addDoc(collection(db, 'registros'), reg);
  registros.unshift({ id: ref.id, ...reg });
}

async function saveTalleres() {
  await setDoc(doc(db, 'config', 'talleres'), { lista: talleres });
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = NAVS.map(n =>
    `<button class="${VIEW===n?'active':''}" onclick="setView('${n}')">${n}</button>`
  ).join('');
}

function renderView() {
  const c = document.getElementById('content');
  if (VIEW === 'Alertas') c.innerHTML = renderAlertas();
  else if (VIEW === 'Importar km') c.innerHTML = renderImportar();
  else if (VIEW === 'Km base') c.innerHTML = renderKmBase();
  else if (VIEW === 'Registro') c.innerHTML = renderRegistro();
  else if (VIEW === 'Historial') c.innerHTML = renderHistorial();
  else if (VIEW === 'Informe mensual') c.innerHTML = renderInforme();
  else if (VIEW === 'Conductores') c.innerHTML = renderConductores();
  bindEvents();
}

window.setView = function(v) { VIEW = v; renderNav(); renderView(); }

// ── ALERTAS ──
function renderAlertas() {
  const alertas = [];
  vehiculos.forEach(v => {
    if (!v.km) return;
    Object.keys(LABELS).forEach(k => {
      if (!v.int[k]) return;
      const f = getFaltante(v, k);
      const est = estadoBadge(f);
      if (alertFiltro === 'todos' || alertFiltro === est)
        alertas.push({ placa: v.placa, conductor: v.conductor, item: LABELS[k], faltante: f, proximo: getProximo(v, k), estado: est });
    });
  });
  alertas.sort((a, b) => (a.faltante ?? 99999) - (b.faltante ?? 99999));

  const rojos = alertas.filter(a => a.estado === 'rojo').length;
  const amarillos = alertas.filter(a => a.estado === 'amarillo').length;
  const verdes = alertas.filter(a => a.estado === 'verde').length;
  const sinKm = vehiculos.filter(v => !v.km).length;

  const kpis = [
    {l:'Críticos',v:rojos,c:'#A32D2D',bg:'#FCEBEB',k:'rojo'},
    {l:'Próximos',v:amarillos,c:'#BA7517',bg:'#FAEEDA',k:'amarillo'},
    {l:'Al día',v:verdes,c:'#3B6D11',bg:'#EAF3DE',k:'verde'},
    {l:'Sin km',v:sinKm,c:'#185FA5',bg:'#E6F1FB',k:'sin'},
  ];

  return `
  <div class="grid-4">
    ${kpis.map(k => `
      <div class="kpi ${alertFiltro===k.k?'selected':''}" style="background:${alertFiltro===k.k?k.bg:'#f5f5f0'};color:${k.c}" onclick="filtrarAlerta('${k.k}')">
        <label>${k.l}</label>
        <span>${k.v}</span>
      </div>`).join('')}
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <select id="kmPlaca" style="flex:1"><option value="">Actualizar km de vehículo...</option>${vehiculos.map(v=>`<option value="${v.placa}">${v.placa} — ${v.km?fmt(v.km)+' km':'sin km'}</option>`).join('')}</select>
    <input type="number" id="kmNuevo" placeholder="Km nuevo" style="width:130px"/>
    <button class="btn btn-sm" onclick="actualizarKm()">Actualizar</button>
  </div>
  <div class="card">
    <div class="card-header"><span>Alertas por kilometraje</span><span style="font-size:11px;color:#888">${alertas.length} ítems</span></div>
    ${alertas.length === 0 ? '<div class="empty">No hay alertas en este filtro</div>' :
      alertas.map(a => `
        <div class="row">
          <div class="dot" style="background:${dotColor(a.estado)}"></div>
          <div style="font-weight:500;font-size:13px;min-width:72px">${a.placa}</div>
          <div style="font-size:12px;color:#888;flex:1">${a.item}</div>
          <div style="font-size:11px;color:#888;min-width:100px;text-align:right">Próximo: ${fmt(a.proximo)} km</div>
          <div class="badge ${a.estado}" style="min-width:110px;text-align:center">
            ${a.faltante <= 0 ? 'Vencido '+fmt(Math.abs(a.faltante))+' km' : 'Faltan '+fmt(a.faltante)+' km'}
          </div>
        </div>`).join('')}
  </div>
  ${sinKm > 0 ? `<div style="background:#E6F1FB;border-radius:8px;padding:10px 14px;font-size:12px;color:#185FA5">Sin km: ${vehiculos.filter(v=>!v.km).map(v=>v.placa).join(', ')}</div>` : ''}`;
}

window.filtrarAlerta = function(k) {
  alertFiltro = alertFiltro === k ? 'todos' : k;
  renderView();
}

window.actualizarKm = async function() {
  const placa = $('kmPlaca').value;
  const km = parseInt($('kmNuevo').value);
  if (!placa || !km) return;
  await saveVehiculo(placa, { km });

// ── IMPORTAR KM ──
function renderImportar() {
  return `
  <div style="font-size:13px;color:#888;margin-bottom:14px">Sube el reporte de preoperacionales (.txt o .csv) para actualizar todos los km de la flota.</div>
  <label style="display:block;border:1.5px dashed #ddd;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;margin-bottom:14px;background:#f5f5f0">
    <div style="font-size:28px;margin-bottom:8px">📊</div>
    <div style="font-size:13px;font-weight:500;margin-bottom:4px">Toca aquí para subir el reporte</div>
    <div style="font-size:12px;color:#888">Archivos .txt o .csv — columnas Placa y Kilometraje</div>
    <input type="file" accept=".txt,.csv" style="display:none" onchange="procesarImport(event)"/>
  </label>
  <div id="importResult"></div>`;
}

window.procesarImport = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { $('importResult').innerHTML = '<div style="color:red;padding:10px">Archivo sin datos</div>'; return; }
    const sep = lines[0].includes('\t') ? '\t' : lines[0].includes(';') ? ';' : ',';
    const headers = lines[0].split(sep).map(h => h.trim().toLowerCase().replace(/['"]/g,''));
    const pi = Math.max(0, headers.findIndex(h => h.includes('placa')));
    const ki = Math.max(1, headers.findIndex(h => h.includes('km') || h.includes('kilometr')));
    const rows = lines.slice(1).map(l => {
      const cols = l.split(sep).map(c => c.trim().replace(/['"]/g,''));
      return { placa: (cols[pi]||'').toUpperCase().replace(/\s/g,''), km: parseInt((cols[ki]||'').replace(/[^0-9]/g,''))||0 };
    }).filter(r => r.placa && r.km > 0 && r.km < 9999999);

    const enFlota = rows.filter(r => vehiculos.find(v => v.placa === r.placa));
    const noFlota = rows.filter(r => !vehiculos.find(v => v.placa === r.placa));
    const actualizan = enFlota.filter(r => { const v = vehiculos.find(x => x.placa === r.placa); return r.km > (v?.km||0); });
    const noPlacas = vehiculos.filter(v => !enFlota.find(r => r.placa === v.placa));

    // ── GUARDAR EN VARIABLE GLOBAL (fix del bug) ──
    pendingImport = actualizan;

    $('importResult').innerHTML = `
      <div class="grid-4" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
        <div class="kpi"><label>Se actualizarán</label><span style="color:#3B6D11">${actualizan.length}</span></div>
        <div class="kpi"><label>Sin cambio</label><span style="color:#BA7517">${enFlota.length - actualizan.length}</span></div>
        <div class="kpi"><label>No en flota</label><span style="color:#888">${noFlota.length}</span></div>
      </div>
      ${noPlacas.length > 0 ? `
      <div class="alert-box">
        <div class="title">⚠️ ${noPlacas.length} vehículos sin preoperacional</div>
        ${noPlacas.map(v => `<div class="alert-row"><span style="font-weight:500;color:#A32D2D">${v.placa} — ${v.conductor}</span><span style="font-size:11px;color:#A32D2D">${v.cel}</span></div>`).join('')}
      </div>` : ''}
      <div class="card" style="margin-bottom:14px">
        <div class="card-header">Vista previa — flota Ravel</div>
        ${enFlota.map(r => {
          const v = vehiculos.find(x => x.placa === r.placa);
          const sube = r.km > (v?.km||0);
          return `<div class="row">
            <div class="dot" style="background:${sube?'#3B6D11':'#BA7517'}"></div>
            <div style="font-weight:500;font-size:13px;min-width:72px">${r.placa}</div>
            <div style="font-size:12px;color:#888;flex:1">Actual: ${fmt(v?.km||0)} → <strong>${fmt(r.km)} km</strong></div>
            <div style="font-size:12px;font-weight:500;color:${sube?'#3B6D11':'#BA7517'}">${sube?'+'+fmt(r.km-(v?.km||0))+' km':'Sin cambio'}</div>
          </div>`;
        }).join('')}
      </div>
      <button class="btn" style="width:100%" onclick="aplicarImport()">Aplicar ${actualizan.length} actualizaciones</button>`;
  };
  reader.readAsText(file, 'UTF-8');
}

// ── CORREGIDO: ya no recibe parámetro, usa pendingImport ──
window.aplicarImport = async function() {
  if (!pendingImport || pendingImport.length === 0) {
    toast('No hay actualizaciones pendientes');
    return;
  }
  const btn = document.querySelector('#importResult .btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Aplicando...'; }
  for (const r of pendingImport) {
    await saveVehiculo(r.placa, { km: r.km });
  }
  pendingImport = [];
  toast('Kilometrajes actualizados ✓');
  renderView();
}

// ── KM BASE ──
function renderKmBase() {
  const btns = vehiculos.map(v => `<button class="nav" style="padding:5px 10px;font-size:11px;border-radius:5px;cursor:pointer;border:0.5px solid #ddd;background:${histPlaca===v.placa?'#0F6E56':'#f5f5f0'};color:${histPlaca===v.placa?'#fff':'#666'}" onclick="selKmBase('${v.placa}')">${v.placa}</button>`).join('');
  const v = vehiculos.find(x => x.placa === histPlaca);
  if (!v) return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${btns}</div>`;
  const base = kmBase[v.placa] || {};

  const rows = Object.keys(LABELS).map(k => {
    if (!v.int[k]) return '';
    const bv = base[k] !== undefined ? base[k] : '';
    const prox = bv !== '' ? parseInt(bv) + v.int[k] : (v.km ? Math.floor(v.km/v.int[k])*v.int[k]+v.int[k] : null);
    const falt = prox && v.km ? prox - v.km : null;
    const est = estadoBadge(falt);
    return `<div class="row" style="align-items:center">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${LABELS[k]}</div>
        <div style="font-size:11px;color:#888">Cada ${fmt(v.int[k])} km</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <input type="number" placeholder="Km último mant." value="${bv}" data-key="${k}" class="kmbase-input" style="width:160px;text-align:right" onchange="updateKmBaseField('${v.placa}','${k}',this.value)"/>
        ${prox && v.km ? `<div class="badge ${est}">${falt<=0?'Vencido '+fmt(Math.abs(falt))+' km':'Faltan '+fmt(falt)+' km'}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
  <div style="font-size:13px;color:#888;margin-bottom:12px">Ingresa el km del último mantenimiento por vehículo. Se guarda automáticamente.</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${btns}</div>
  <div class="card">
    <div class="card-header"><span>${v.placa} — ${v.marca} ${v.modelo}</span><span style="font-size:12px;color:#888">Km actual: ${v.km?fmt(v.km)+' km':'sin km'}</span></div>
    ${rows}
  </div>`;
}

window.selKmBase = function(p) { histPlaca = p; renderView(); }

window.updateKmBaseField = async function(placa, k, val) {
  await saveKmBase(placa, { [k]: val ? parseInt(val) : '' });
  toast('Guardado');
}

window.autoFillConductor = function() {
  const placa = $('rPlaca').value;
  const v = vehiculos.find(x => x.placa === placa);
  if (v) $('rConductor').value = v.conductor;
}

window.onItemChange = function() {
  const val = $('rItem').value;
  const placa = $('rPlaca').value;
  $('rOtroWrap').style.display = val === '__otro__' ? 'block' : 'none';
  const msg = $('rItemMsg');
  if (val && val !== '__otro__' && placa) {
    const lbl = ITEMS_BASE.find(i => i.key === val)?.label;
    msg.textContent = `Al guardar, el km base de "${lbl}" se actualizará automáticamente.`;
    msg.style.display = 'block';
  } else { msg.style.display = 'none'; }
}

window.agregarTaller = async function() {
  const t = $('rNuevoTaller').value.trim().toUpperCase();
  if (t && !talleres.includes(t)) {
    talleres.push(t);
    talleres.sort();
    await saveTalleres();
    toast('Proveedor agregado');
    renderView();
  }
}

window.guardarRegistro = async function() {
  const placa = $('rPlaca').value;
  const fecha = $('rFecha').value;
  const tipo = $('rTipo').value;
  if (!placa || !fecha || !tipo) { toast('Completa los campos obligatorios'); return; }

  const item = $('rItem').value;
  const descBase = item === '__otro__' ? $('rOtro').value : (ITEMS_BASE.find(i=>i.key===item)?.label||'');
  const obs = $('rDesc').value;
  const desc = obs ? descBase + ' — ' + obs : descBase;
  const km = parseInt($('rKm').value)||0;
  const costo = parseInt($('rCosto').value)||0;
  const taller = $('rTaller').value;
  const conductor = $('rConductor').value;

  const reg = { placa, fecha, tipo, itemBase: item, desc, km, costo, taller, conductor,
    registradoPor: currentUser ? currentUser.nombre : '',
    cedulaRegistro: currentUser ? currentUser.cedula : '',
    ts: Date.now() };
  await addRegistro(reg);

  if (km > 0) {
    const v = vehiculos.find(x => x.placa === placa);
    if (v && km > (v.km||0)) await saveVehiculo(placa, { km });
    if (item && item !== '__otro__') await saveKmBase(placa, { [item]: km });
  }

  toast('Registro guardado');
  renderView();
}

// ── HISTORIAL ──
function renderHistorial() {
  const btns = vehiculos.map(v => `<button style="padding:5px 10px;font-size:11px;border-radius:5px;cursor:pointer;border:0.5px solid #ddd;background:${histPlaca===v.placa?'#0F6E56':'#f5f5f0'};color:${histPlaca===v.placa?'#fff':'#666'}" onclick="selHist('${v.placa}')">${v.placa}</button>`).join('');

  const regs = registros.filter(r => r.placa === histPlaca).sort((a,b) => b.fecha?.localeCompare(a.fecha));

    return `<div class="row" style="justify-content:space-between">
      <span style="font-size:13px">${LABELS[k]}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:#888">c/ ${fmt(v.int[k])} km · próx: ${fmt(getProximo(v,k))}</span>
        <div class="badge ${est}">${f===null?'Sin dato':f<=0?'Vencido '+fmt(Math.abs(f))+' km':'Faltan '+fmt(f)+' km'}</div>

  return `
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${btns}</div>

    ${[{l:'Tipo',v:v.tipo},{l:'Km actuales',v:v.km?fmt(v.km)+' km':'Sin km'},{l:'Prev./Pred.',v:prev},{l:'Correctivos',v:corr}].map(c=>`<div class="kpi"><label>${c.l}</label><span style="font-size:16px">${c.v}</span></div>`).join('')}
  </div>` : ''}
  <div class="card">
    <div class="card-header">
      <span>Historial ${histPlaca} (${regs.length})</span>
      ${total > 0 ? `<span style="font-size:12px;color:#0F6E56;font-weight:500">Total: ${money(total)}</span>` : ''}
    </div>

          <div>
            <div style="font-size:13px;font-weight:500">${r.desc||r.tipo}</div>
            <div style="font-size:12px;color:#888;margin-top:2px">${r.fecha}${r.taller?' · '+r.taller:''}${r.km?' · '+fmt(r.km)+' km':''}${r.registradoPor?' · '+r.registradoPor:''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:12px">
            <div style="font-weight:500;font-size:13px">${money(r.costo)}</div>
            <div class="tag ${r.tipo==='Correctivo'?'corr':r.tipo==='Predictivo'?'pred':'prev'}">${r.tipo}</div>
          </div>
        </div>`).join('')}
  </div>
  ${v && v.km ? `<div class="card"><div class="card-header">Estado mantenimientos — ${histPlaca}</div>${estadoRows}</div>` : ''}`;
}

window.selHist = function(p) { histPlaca = p; renderView(); }

// ── INFORME MENSUAL ──
function renderInforme() {
  const regMes = registros.filter(r => {
    const d = new Date(r.fecha);
    return d.getMonth() === mesInf && d.getFullYear() === 2026;
  });
  const total = regMes.reduce((s,r)=>s+(r.costo||0),0);
  const prev = regMes.filter(r=>r.tipo!=='Correctivo');
  const corr = regMes.filter(r=>r.tipo==='Correctivo');
  const porPlaca = {};
  regMes.forEach(r=>{if(!porPlaca[r.placa])porPlaca[r.placa]=0;porPlaca[r.placa]+=r.costo||0;});
  const placasOrden = Object.entries(porPlaca).sort((a,b)=>b[1]-a[1]);

  const mBtns = MESES.map((m,i)=>`<button style="padding:5px 10px;font-size:11px;border-radius:5px;cursor:pointer;border:0.5px solid #ddd;background:${mesInf===i?'#0F6E56':'#f5f5f0'};color:${mesInf===i?'#fff':'#666'}" onclick="selMes(${i})">${m}</button>`).join('');

  return `
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">${mBtns}</div>
  <div style="font-size:14px;font-weight:500;margin-bottom:12px">Informe — ${MESES[mesInf]} 2026</div>
  <div class="grid-4" style="margin-bottom:14px">
    ${[{l:'Registros',v:regMes.length,c:'#185FA5'},{l:'Costo total',v:'$'+Math.round(total/1000)+'K',c:'#0F6E56'},{l:'Prev./Pred.',v:prev.length,c:'#3B6D11'},{l:'Correctivos',v:corr.length,c:'#A32D2D'}].map(k=>`<div class="kpi"><label>${k.l}</label><span style="font-size:20px;color:${k.c}">${k.v}</span></div>`).join('')}
  </div>
  ${regMes.length === 0 ? `<div class="empty">Sin registros para ${MESES[mesInf]} 2026</div>` : `
  <div class="card">
    <div class="card-header">Costo por vehículo</div>
    ${placasOrden.map(([p,c])=>{const pct=Math.round((c/total)*100);return `
      <div class="row" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13px;font-weight:500">${p}</span>
          <span style="font-size:13px;font-weight:500">${money(c)} <span style="font-size:11px;color:#888;font-weight:400">(${pct}%)</span></span>
        </div>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      </div>`;}).join('')}
  </div>
  <div class="card">
    <div class="card-header">Detalle completo</div>
    ${regMes.map(r=>`
      <div class="row" style="justify-content:space-between">
        <div><span style="font-weight:500;font-size:13px">${r.placa}</span><span style="font-size:12px;color:#888;margin-left:8px">${r.fecha}</span><div style="font-size:12px;margin-top:2px">${r.tipo} — ${r.taller}</div></div>
        <div style="font-weight:500;font-size:13px;flex-shrink:0;margin-left:12px">${money(r.costo)}</div>
      </div>`).join('')}
    <div class="row" style="justify-content:space-between;font-weight:500">
      <span>Total ${MESES[mesInf]}</span><span style="color:#0F6E56">${money(total)}</span>
    </div>
  </div>`}`;
}

window.selMes = function(i) { mesInf = i; renderView(); }

// ── CONDUCTORES ──
function renderConductores() {
  return `
  <div class="card">
    <div class="card-header">Generar alerta WhatsApp</div>
    <div style="padding:14px">
      <button class="btn btn-green" onclick="genWhatsapp()">Generar mensaje WhatsApp</button>
      <div id="waResult" style="margin-top:10px"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">Conductores — ${vehiculos.length} vehículos</div>
    ${vehiculos.map(v=>`
      <div class="row" style="justify-content:space-between">
        <div>
          <span style="font-weight:500;font-size:13px">${v.conductor}</span>
          <span style="font-size:12px;color:#888;margin-left:8px">${v.cel}</span>
          <div style="font-size:12px;color:#888;margin-top:2px">${v.marca} ${v.modelo}</div>
        </div>
        <div style="font-size:12px;background:#f5f5f0;color:#888;padding:2px 10px;border-radius:5px;flex-shrink:0">${v.placa}</div>
      </div>`).join('')}
  </div>`;
}

window.genWhatsapp = function() {
  const items = [];
  vehiculos.forEach(v => {
    if (!v.km) return;
    Object.keys(LABELS).forEach(k => {
      if (!v.int[k]) return;
      const f = getFaltante(v, k);
      if (f !== null && f <= 2000)
        items.push({ placa:v.placa, conductor:v.conductor, cel:v.cel, item:LABELS[k], faltante:f });
    });
  });
  const msg = items.length === 0 ? 'Sin alertas próximas.' :
    `*TRANSPORTE RAVEL — Alerta de mantenimiento*\n\n${items.map(a=>`🚌 *${a.placa}* — ${a.conductor}\n   ⚠️ ${a.item}: ${a.faltante<=0?`*VENCIDO ${fmt(Math.abs(a.faltante))} km*`:`faltan *${fmt(a.faltante)} km*`}`).join('\n\n')}\n\n_Transporte Ravel — Control de flota_`;
  $('waResult').innerHTML = `
    <textarea readonly style="font-size:12px;background:#f5f5f0;resize:vertical;margin-bottom:8px" rows="8">${msg}</textarea>
    <button class="btn btn-sm" onclick="navigator.clipboard.writeText(\`${msg.replace(/`/g,"'")}\`)">Copiar mensaje</button>`;
}

function bindEvents() {}

// Solo iniciar si ya hay sesión activa
if (currentUser) initData();
</script>
</body>
</html>
